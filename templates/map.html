<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Colaborativo - Rainbow Safe</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* Ajuste para o mapa ocupar a tela toda no mobile */
        body, html { height: 100%; margin: 0; padding: 0; background-color: #f8f9fa; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        /* Botão Flutuante (FAB) para adicionar local */
        .fab-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #6f42c1; /* Roxo padrão */
            color: white;
            font-size: 28px;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .fab-add:hover { transform: scale(1.1); background-color: #5936a2; }

        /* Botão Flutuante para Voltar */
        .fab-back {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: white;
            color: #212529;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            text-decoration: none;
        }
        .fab-back:hover { background-color: #f8f9fa; color: #6f42c1; }

        /* Estilo dos Popups do Mapa */
        .leaflet-popup-content-wrapper { border-radius: 12px; }
        .popup-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .badge-safe { background-color: #198754; color: white; padding: 3px 8px; border-radius: 12px; font-size: 12px; }
        .badge-caution { background-color: #ffc107; color: black; padding: 3px 8px; border-radius: 12px; font-size: 12px; }
        .badge-service { background-color: #0dcaf0; color: black; padding: 3px 8px; border-radius: 12px; font-size: 12px; }
        .btn-report { font-size: 12px; color: #dc3545; background: none; border: none; padding: 0; text-decoration: underline; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="map"></div>

    <a href="/" class="fab-back" title="Voltar ao Início">
        <i class="bi bi-arrow-left"></i>
    </a>

    <button class="fab-add" data-bs-toggle="modal" data-bs-target="#addPlaceModal" title="Adicionar Local">
        <i class="bi bi-plus"></i>
    </button>

    <div class="modal fade" id="addPlaceModal" tabindex="-1" aria-labelledby="addPlaceModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title fw-bold" id="addPlaceModalLabel">Mapear Local</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <p class="text-muted small">A sua localização atual será usada para criar este marcador.</p>
            <form id="addPlaceForm">
              <div class="mb-3">
                <label for="placeName" class="form-label">Nome do Local/Rua</label>
                <input type="text" class="form-control" id="placeName" placeholder="Ex: Ponto de ônibus bloco 3Q" required>
              </div>
              <div class="mb-3">
                <label for="placeCategory" class="form-label">Categoria</label>
                <select class="form-select" id="placeCategory" required>
                  <option value="safe">🟢 Seguro (Bem iluminado, movimentado)</option>
                  <option value="caution">🟡 Atenção (Escuro, histórico de assédio)</option>
                  <option value="service">🔵 Serviço (Segurança, hospital, apoio)</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="placeNotes" class="form-label">Observações</label>
                <textarea class="form-control" id="placeNotes" rows="2" placeholder="Ex: Evite passar por aqui depois das 22h..."></textarea>
              </div>
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="placeTemporary">
                <label class="form-check-label small" for="placeTemporary">
                  Alerta Temporário (Apaga automaticamente em 7 dias)
                </label>
              </div>
              <button type="submit" class="btn btn-primary w-100 fw-bold" id="btnSavePlace">Salvar Local</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Inicializa o mapa centrado em Uberlândia (UFU Santa Mônica aprox.)
        const map = L.map('map').setView([-18.9128, -48.2755], 14);

        // Adiciona o mapa base do OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap - Rainbow Safe UFU'
        }).addTo(map);

        // Ícones customizados para as categorias (usando CDN do Leaflet Color Markers)
        const icons = {
            safe: L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] }),
            caution: L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-orange.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] }),
            service: L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] })
        };

        const badges = {
            safe: '<span class="badge-safe">Seguro</span>',
            caution: '<span class="badge-caution">Atenção</span>',
            service: '<span class="badge-service">Serviço</span>'
        };

        // Carregar pinos do backend
        async function loadPlaces() {
            try {
                const response = await fetch('/api/places');
                const places = await response.json();
                
                places.forEach(place => {
                    const icon = icons[place.category] || icons.safe;
                    const marker = L.marker([place.lat, place.lon], { icon: icon }).addTo(map);
                    
                    const popupContent = `
                        <div class="popup-title">${place.name}</div>
                        ${badges[place.category]}
                        <p style="margin-top: 8px; font-size: 14px; color: #555;">${place.notes || 'Sem observações adicionais.'}</p>
                        <button class="btn-report" onclick="reportPlace(${place.id})"><i class="bi bi-flag-fill"></i> Denunciar / Desatualizado</button>
                    `;
                    marker.bindPopup(popupContent);
                });
            } catch (error) {
                console.error("Erro ao carregar locais:", error);
            }
        }

        // Função para denunciar um pino
        window.reportPlace = async function(id) {
            if(confirm("Tem certeza que deseja reportar este local como falso ou desatualizado?")) {
                const res = await fetch(`/api/places/${id}/report`, { method: 'POST' });
                if(res.ok) {
                    alert("Obrigado! A comunidade avaliará este marcador.");
                    location.reload(); // Recarrega para atualizar o mapa
                } else {
                    const data = await res.json();
                    alert(data.error || "Você precisa fazer login para denunciar.");
                }
            }
        }

        // Salvar novo local via Modal
        document.getElementById('addPlaceForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSavePlace');
            btn.innerText = "Buscando GPS...";
            btn.disabled = true;

            // Pega a localização atual do celular do usuário
            if (!navigator.geolocation) {
                alert("Geolocalização não é suportada pelo seu navegador.");
                btn.innerText = "Salvar Local"; btn.disabled = false;
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const payload = {
                    name: document.getElementById('placeName').value,
                    category: document.getElementById('placeCategory').value,
                    notes: document.getElementById('placeNotes').value,
                    is_temporary: document.getElementById('placeTemporary').checked,
                    lat: position.coords.latitude,
                    lon: position.coords.longitude
                };

                try {
                    const response = await fetch('/api/places', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();

                    if(response.ok) {
                        location.reload(); // Recarrega para mostrar o pino
                    } else {
                        alert("Erro: " + (result.error || "Você precisa fazer login para adicionar locais."));
                        btn.innerText = "Salvar Local"; btn.disabled = false;
                    }
                } catch (error) {
                    alert("Erro ao conectar com o servidor.");
                    btn.innerText = "Salvar Local"; btn.disabled = false;
                }
            }, (error) => {
                alert("Erro ao acessar o GPS. Verifique as permissões do navegador.");
                btn.innerText = "Salvar Local"; btn.disabled = false;
            }, { enableHighAccuracy: true });
        });

        // Inicia carregando os lugares ao abrir o app
        loadPlaces();
    </script>
</body>
</html>
