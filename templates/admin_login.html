<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acesso Restrito — Rainbow Safe</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body {
      /* Fundo escuro para diferenciar da área de usuário e indicar 'Área Restrita' */
      background: linear-gradient(135deg, #212529 0%, #121416 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px 0;
    }

    .card {
      border-radius: 20px;
      border: none;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }

    .form-control {
      border-radius: 10px;
      padding: 12px 15px;
      border: 1px solid #dee2e6;
      background-color: #f8f9fa;
    }

    .form-control:focus {
      border-color: #212529;
      box-shadow: 0 0 0 0.25rem rgba(33, 37, 41, 0.25);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 15px;
      top: 14px;
      cursor: pointer;
      color: #6c757d;
      font-size: 1.2rem;
    }

    .btn-dark {
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-dark:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .btn-outline-secondary {
      border-radius: 12px;
      padding: 12px;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <main class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5 col-xl-4">
        
        <div class="card bg-white">
          <div class="card-body p-4 p-sm-5">
            
            <div class="text-center mb-4">
              <i class="bi bi-shield-lock-fill text-dark" style="font-size: 3rem;"></i>
              <h1 class="h4 fw-bold text-dark mt-2 mb-1">Acesso Restrito</h1>
              <p class="text-secondary small mb-0">Painel de Moderação • Rainbow Safe</p>
            </div>

            {% if error %}
            <div class="alert alert-danger rounded-3 small fw-medium text-center" role="alert">
              <i class="bi bi-exclamation-octagon-fill me-2"></i> {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/admin/login" class="d-grid gap-3 mt-4">
              
              <div class="password-wrapper">
                <input class="form-control pe-5" id="password" name="password" type="password" placeholder="Digite a senha do administrador" required>
                <i class="bi bi-eye-slash password-toggle" id="togglePassword" title="Mostrar/Ocultar senha"></i>
              </div>

              <button type="submit" class="btn btn-dark btn-lg mt-2">
                <i class="bi bi-box-arrow-in-right me-2"></i> Entrar no Painel
              </button>
              
              <a class="btn btn-outline-secondary" href="/">
                <i class="bi bi-arrow-left me-2"></i> Voltar para o Início
              </a>

            </form>

          </div>
        </div>

        <div class="text-center mt-4 text-white-50 small">
          Acesso exclusivo para administradores e moderadores autorizados da UFU.
        </div>

      </div>
    </div>
  </main>

  <script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.classList.toggle('bi-eye');
      this.classList.toggle('bi-eye-slash');
    });
  </script>

</body>
</html>
