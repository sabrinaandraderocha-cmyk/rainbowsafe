<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rastrear caminhada • Rainbow Safe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    #map { height: 420px; width: 100%; border-radius: 16px; }
  </style>
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="mb-3">
      <h1 class="h4">🌈 Rainbow Safe — Rastreamento</h1>
      <p class="text-secondary mb-1">
        Sessão: <strong>{{ label or "Voltar pra casa" }}</strong>
      </p>
      <p class="small text-secondary">
        Código: <span class="font-monospace">{{ session_code }}</span>
      </p>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div id="status" class="mb-3 text-secondary">Carregando localização...</div>
        <div id="map"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const code = "{{ session_code }}";
    const map = L.map("map").setView([-18.9146, -48.2754], 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    let marker = null;

    async function refreshStatus() {
      const res = await fetch(`/api/walk/status/${code}`);
      const data = await res.json();

      if (!res.ok || data.error) {
        document.getElementById("status").textContent = "Sessão não encontrada.";
        return;
      }

      const statusEl = document.getElementById("status");
      statusEl.innerHTML = `
        <strong>${data.label || "Voltar pra casa"}</strong><br>
        Ativa: ${data.is_active ? "Sim" : "Não"}<br>
        Sem atualização: ${data.is_stale ? "Sim" : "Não"}<br>
        Último check-in: ${data.last_ping_at}
      `;

      if (data.last_lat && data.last_lon) {
        const latlng = [data.last_lat, data.last_lon];
        if (!marker) {
          marker = L.marker(latlng).addTo(map);
        } else {
          marker.setLatLng(latlng);
        }
        map.setView(latlng, 15);
      }
    }

    refreshStatus();
    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>
