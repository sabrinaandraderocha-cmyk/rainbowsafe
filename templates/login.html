<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar • Rainbow Safe</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #6f42c1 0%, #0d6efd 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px 0;
    }

    .card {
      border-radius: 20px;
      border: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .brand {
      font-size: 26px;
      font-weight: 700;
      color: #212529;
    }

    .subtitle {
      color: #6c757d;
      font-size: 14px;
      margin-top: 4px;
    }

    .btn-primary {
      background-color: #6f42c1;
      border-color: #6f42c1;
      border-radius: 12px;
      padding: 12px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #5936a2;
      border-color: #5936a2;
      transform: translateY(-2px);
    }

    .form-control {
      border-radius: 10px;
      padding: 10px 15px;
      border: 1px solid #dee2e6;
    }

    .form-control:focus {
      border-color: #6f42c1;
      box-shadow: 0 0 0 0.25rem rgba(111, 66, 193, 0.25);
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 15px;
      top: 38px;
      cursor: pointer;
      color: #6c757d;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5 col-xl-4">
        
        <div class="card bg-white">
          <div class="card-body p-4 p-sm-5">
            
            <div class="text-center mb-4">
              <div class="brand">🌈 Rainbow Safe</div>
              <div class="subtitle">Bem-vinde de volta!</div>
            </div>

            {% if error %}
            <div class="alert alert-danger rounded-3 small fw-medium text-center" role="alert">
              <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
            </div>
            {% endif %}

            <form method="post" class="row g-3">
              
              <div class="col-12">
                <label for="email" class="form-label small fw-semibold text-dark">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="nome@exemplo.com" required>
              </div>

              <div class="col-12 password-wrapper">
                <label for="password" class="form-label small fw-semibold text-dark">Senha</label>
                <input type="password" class="form-control pe-5" id="password" name="password" placeholder="Sua senha" required>
                <i class="bi bi-eye-slash password-toggle" id="togglePassword" title="Mostrar/Ocultar senha"></i>
              </div>

              <div class="col-12 d-grid mt-4">
                <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                  Entrar
                </button>
              </div>

            </form>

            <div class="text-center mt-4 pt-3 border-top small">
              <span class="text-secondary">Não tem uma conta?</span> 
              <a href="/register" class="fw-bold text-decoration-none" style="color: #6f42c1;">Criar conta</a>
            </div>

          </div>
        </div>
        
        <div class="text-center mt-4 text-white-50 small">
          <a href="/" class="text-white-50 text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Voltar para a página inicial</a>
        </div>

      </div>
    </div>
  </div>

  <script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function (e) {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.classList.toggle('bi-eye');
      this.classList.toggle('bi-eye-slash');
    });
  </script>

</body>
</html>
